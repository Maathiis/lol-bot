services:
  lol-bot:
    build: .
    container_name: lol-bot
    restart: unless-stopped
    volumes:
      # Lier le fichier .env local au conteneur (Secrets)
      - ./.env:/usr/src/app/.env
      # Lier le dossier de données pour la persistance
      - ./data:/usr/src/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
